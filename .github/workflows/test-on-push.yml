name: Test Suite on Push

on:
  push:
    branches: [ develop, staging, master ]
  pull_request:
    branches: [ develop, staging, master ]

jobs:
  # ============================================================================
  # CRITICAL TESTS - Must pass for build to proceed
  # ============================================================================
  critical-tests:
    name: Critical Tests (Conflict Validation)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Critical Tests
        run: ./gradlew testCritical --stacktrace

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-test-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 30

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Critical Tests Report
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: true

  # ============================================================================
  # UNIT TESTS - All unit tests must pass
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: critical-tests
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate Coverage Report
        run: ./gradlew testDebugUnitTestCoverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: app/build/reports/jacoco/testDebugUnitTestCoverage/jacocoTestReport.xml
          flags: unittests
          name: unit-test-coverage

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            app/build/test-results/testDebugUnitTest/
            app/build/reports/tests/testDebugUnitTest/
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/testDebugUnitTestCoverage/
          retention-days: 30

  # ============================================================================
  # BUILD VERIFICATION - Build will fail if tests failed
  # ============================================================================
  build:
    name: Build APK/AAB
    runs-on: ubuntu-latest
    needs: [critical-tests, unit-tests]
    timeout-minutes: 20

    strategy:
      matrix:
        build-type: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "OAUTH_CLIENT_ID=dummy_for_ci" > local.properties
          echo "OAUTH_CLIENT_SECRET=dummy_for_ci" >> local.properties
          echo "VERSION_CODE=100" >> local.properties

      - name: Build ${{ matrix.build-type }} APK
        if: matrix.build-type == 'debug'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build ${{ matrix.build-type }} AAB
        if: matrix.build-type == 'release'
        run: ./gradlew bundleRelease --stacktrace || echo "Release build may fail without signing config (expected in CI)"

      - name: Upload APK
        if: matrix.build-type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ============================================================================
  # INTEGRATION TESTS - Run on device (optional for PR, required for staging/master)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    needs: [critical-tests, unit-tests]
    timeout-minutes: 30
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew connectedAndroidTest --stacktrace

      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/
          retention-days: 30

  # ============================================================================
  # TEST SUMMARY - Aggregate results
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [critical-tests, unit-tests, build]
    if: always()

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Summary
        run: |
          echo "# 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.critical-tests.result }}" == "success" ]; then
            echo "✅ **Critical Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Critical Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "✅ **Unit Tests**: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Unit Tests**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **Build**: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build**: FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.critical-tests.result }}" != "success" ]; then
            echo "- Fix critical test failures (see CONFLICTS_AND_ISSUES.md)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "- Review unit test failures in artifacts" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Detailed reports available in workflow artifacts" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Tests Failed
        if: needs.critical-tests.result != 'success' || needs.unit-tests.result != 'success'
        run: |
          echo "❌ Tests failed. Build cannot proceed."
          exit 1
